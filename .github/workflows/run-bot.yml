name: run-bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # Muutettu 10 minuuttiin (toimii varmemmin)

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Debug - list files and environment
        run: |
          echo "=== Tiedostot ==="
          ls -la
          echo ""
          echo "=== Nykyinen hakemisto ==="
          pwd
          echo ""
          echo "=== Python versio ==="
          python --version
          echo ""
          echo "=== Ympäristömuuttujat (ilman salaisuuksia) ==="
          echo "TELEGRAM_TOKEN asetettu: ${{ secrets.TELEGRAM_TOKEN != '' }}"
          echo "TELEGRAM_CHAT_ID asetettu: ${{ secrets.TELEGRAM_CHAT_ID != '' }}"
          echo "FMI_STATION asetettu: ${{ secrets.FMI_STATION != '' }}"

      - name: Install dependencies
        run: |
          pip install requests
          echo "=== Asennetut paketit ==="
          pip list

      - name: Run tuulibotti
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FMI_STATION: ${{ secrets.FMI_STATION }}
        run: |
          echo "=== Käynnistetään tuulibotti ==="
          python tuulibotti.py
          echo "=== Tuulibotti valmis ==="

      - name: Upload FMI XML
        if: always()  # Tämä varmistaa että XML tallentuu vaikka botti epäonnistuisi
        uses: actions/upload-artifact@v4
        with:
          name: fmi_raw
          path: ./fmi_raw.xml
